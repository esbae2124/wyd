<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거여동성당 묵주기도 고리기도 봉헌 시간표</title>

<meta property="og:type" content="website">
<meta property="og:title" content="거여동성당 묵주기도 고리기도 봉헌 시간표">
<meta property="og:description" content="날짜별로 한 달의 기도를 실시간으로 봉헌하는 시간표 시스템">
<meta property="og:image" content="http://www.geoyeosd.or.kr/kr/images/content/img01.jpg">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✝</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght=400;600&family=Noto+Sans+KR:wght=300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;
  --surface:#ffffff;
  --surface2:#f0e8de;
  --border:#e2ddd6;
  --border2:#c4a882;
  --text:#1a1814;
  --text-secondary:#6b6560;
  --text-muted:#9e9990;
  --accent:#7a5c3a;
  --accent-light:#f0e8de;
  --accent-mid:#c4a882;
  
  --admin-color:#c0504e;
  --admin-border:#a0403e;
  
  --danger:#c0594e;
  --danger-light:#fde8e8;
  --success:#2d6b32;
  --success-light:#edf4ee;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:2rem 1rem 1.5rem;text-align:center}
.cross-symbol{display:block;font-size:24px;color:var(--accent-mid);margin-bottom:5px}
.site-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;color:var(--text)}
.site-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px}

.container{max-width:1150px;margin:0 auto;padding:16px 12px 48px}

.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.select-month{padding:6px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;outline:none}
.select-month:focus{border-color:var(--accent-mid)}

.btn{padding:6px 12px;font-size:13px;font-weight:500;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--surface);color:var(--text-secondary);display:flex;align-items:center;gap:4px;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.btn:hover{border-color:var(--accent-mid);background:var(--bg)}
.btn.admin-active{background:var(--admin-color);color:#fff;border-color:var(--admin-border)}

.main-layout{display:grid;grid-template-columns:1fr 420px;gap:16px;align-items:start}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;background:var(--surface)}
.card-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--accent)}
.save-indicator{margin-left:auto;font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}

.calendar-container{padding:16px}
.calendar-grid{display:grid;grid-template-columns:repeat(7, 1fr);gap:4px;text-align:center}
.calendar-day-header{font-size:12px;font-weight:500;color:var(--text-muted);padding:5px 0}
.calendar-day-header:nth-child(1){color:var(--danger)}
.calendar-day-header:nth-child(7){color:#5a82c0}

.calendar-cell{min-height:90px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;gap:4px}
.calendar-cell.other-month{background:transparent;border-color:transparent;opacity:0.3;pointer-events:none}
.calendar-cell.today{background:#f0ebe3;border:1.5px solid #8b6c47}
.calendar-cell .day-num{font-size:11px;font-weight:500;color:var(--text-muted)}
.calendar-cell:nth-child(7n+1) .day-num{color:var(--danger)}
.calendar-cell:nth-child(7n) .day-num{color:#5a82c0}
.calendar-cell.today .day-num{color:var(--accent);font-weight:bold}

.calendar-cell .list-names{width:100%;font-size:10px;color:var(--success);background:var(--success-light);font-weight:500;border-radius:3px;padding:1px 3px;text-align:center;word-break:break-all;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.list-panel{max-height:calc(100vh - 180px);overflow-y:auto;position:sticky;top:20px}
.list-body{padding:12px}

.row-item{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--bg);transition:background 0.1s}
.row-item:hover{background:var(--bg)}
.row-item:last-child{border-bottom:none}

.row-date-badge{width:58px;font-size:11px;font-weight:500;color:var(--text-secondary);background:var(--bg);padding:4px 5px;border-radius:6px;text-align:center;flex-shrink:0}
.row-item.sunday .row-date-badge{background:var(--danger-light);color:var(--danger)}
.row-item.saturday .row-date-badge{background:#edf3f9;color:#5a82c0}

.name-input{flex:1;padding:6px 10px;font-size:13px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);outline:none;transition:border-color 0.15s}
.name-input:focus{border-color:var(--accent-mid)}
.name-input:placeholder-shown{border-style:dashed}

body.is-locked .name-input{background:var(--bg);color:var(--text-secondary);cursor:not-allowed;border-style:solid}

.site-footer{text-align:center;padding:2rem 1rem;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:2rem}

@media(max-width:768px){
  .container{padding:12px 8px 32px}
  .main-layout{grid-template-columns:1fr}
  .list-panel{position:static;max-height:none}
  .calendar-cell{min-height:75px;padding:4px}
}
</style>
</head>
<body class="is-locked">

<header class="site-header">
  <span class="cross-symbol">✝</span>
  <h1 class="site-title">거여동성당 묵주기도 고리기도 봉헌 시간표</h1>
  <p class="site-subtitle">우측 목록에 이름을 입력하면 달력에 실시간으로 반영됩니다</p>
</header>

<div class="container">
  <div class="toolbar">
    <select class="select-month" id="month-select" onchange="onMonthChange()">
      <option value="2026-05">2026년 5월</option>
      <option value="2026-06" selected>2026년 6월</option>
      <option value="2026-07">2026년 7월</option>
      <option value="2026-08">2026년 8월</option>
      <option value="2026-09">2026년 9월</option>
      <option value="2026-10">2026년 10월</option>
    </select>
    <button class="btn" id="lock-toggle-btn" onclick="toggleLockMode()" style="margin-left:auto;">🔒 보기 모드</button>
  </div>

  <div class="main-layout">
    <div class="card">
      <div class="card-header">
        <span>📅</span>
        <span class="card-title">봉헌 현황 달력</span>
        <span class="save-indicator" id="sync-indicator">💾 연결 중...</span>
      </div>
      <div class="calendar-container">
        <div class="calendar-grid" id="calendar-header-grid">
          <div class="calendar-day-header">일</div>
          <div class="calendar-day-header">월</div>
          <div class="calendar-day-header">화</div>
          <div class="calendar-day-header">수</div>
          <div class="calendar-day-header">목</div>
          <div class="calendar-day-header">금</div>
          <div class="calendar-day-header">토</div>
        </div>
        <div class="calendar-grid" id="calendar-body-grid" style="margin-top:6px">
          </div>
      </div>
    </div>

    <div class="card list-panel">
      <div class="card-header" style="position:sticky;top:0;background:var(--surface);z-index:10">
        <span>✍️</span>
        <span class="card-title">명단 기입 및 확인</span>
      </div>
      <div class="list-body" id="list-container">
        </div>
    </div>
  </div>
</div>

<footer class="site-footer">
  묵주기도 고리기도 봉헌 시간표 시스템입니다
</footer>

<script>
  // ⚠️ 여기에 구글 Apps Script 웹앱 URL 주소
const SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxxf2nrMLu5n065fWB8puF0fqPvh0a3Xxjl_BcCpVtcE8K5qmTy2q8esX2aPhk-WFvRKg/exec';
const PASSWORD_VALUE = "1004"; 
let isLockedMode = true; 

let dbData = {}; 
let saveTimeout = null;

function toggleLockMode() {
  if (isLockedMode) {
    const pw = prompt("관리자 비밀번호를 입력하세요:");
    if (pw === PASSWORD_VALUE) {
      isLockedMode = false;
      document.body.classList.remove('is-locked');
      const btn = document.getElementById('lock-toggle-btn');
      btn.textContent = "🔓 관리자 모드";
      btn.classList.add('admin-active');
      toggleInputs(false);
      alert("✅ 관리자 권한이 인증되었습니다. 명단 수정이 가능합니다.");
    } else if (pw !== null) {
      alert("비밀번호가 일치하지 않습니다.");
    }
  } else {
    isLockedMode = true;
    document.body.classList.add('is-locked');
    const btn = document.getElementById('lock-toggle-btn');
    btn.textContent = "🔒 보기 모드";
    btn.classList.remove('admin-active');
    toggleInputs(true);
    alert("🔒 다시 안전하게 조회 전용 모드로 잠겼습니다.");
  }
}

function toggleInputs(disable) {
  const inputs = document.querySelectorAll('.name-input');
  inputs.forEach(input => input.disabled = disable);
}

function loadData() {
  const ind = document.getElementById('sync-indicator');
  fetch(SCRIPT_WEB_APP_URL)
    .then(res => res.json())
    .then(json => {
      dbData = json || {};
      if(ind) { ind.style.color = 'var(--success)'; ind.innerHTML = '✅ 동기화 완료'; }
      renderAll();
    })
    .catch(e => {
      console.error("데이터 로드 실패", e);
      if(ind) { ind.style.color = 'var(--danger)'; ind.innerHTML = '⚠️ 로드 실패'; }
      renderAll();
    });
}

function saveData() {
  if (isLockedMode) return;
  const ind = document.getElementById('sync-indicator');
  if (ind) { ind.style.color = 'var(--text-secondary)'; ind.innerHTML = '🔄 자동 저장 중...'; }
  
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    fetch(SCRIPT_WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(dbData)
    })
    .then(() => {
      if (ind) {
        ind.style.color = 'var(--success)'; ind.innerHTML = '✅ 자동 저장됨';
        setTimeout(() => { ind.style.color = 'var(--text-muted)'; ind.innerHTML = '💾 자동 저장됨'; }, 1500);
      }
    })
    .catch(e => { if (ind) { ind.style.color = 'var(--danger)'; ind.innerHTML = '⚠️ 저장 실패'; } });
  }, 800);
}

function onMonthChange() {
  renderAll();
}

function renderAll() {
  const monthVal = document.getElementById('month-select').value; 
  const [year, month] = monthVal.split('-').map(Number);
  
  if (!dbData[monthVal]) {
    dbData[monthVal] = {};
  }
  
  const currentMonthData = dbData[monthVal];
  
  const listContainer = document.getElementById('list-container');
  listContainer.innerHTML = '';
  
  const daysInMonth = new Date(year, month, 0).getDate();
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dayOfWeek = new Date(year, month - 1, d).getDay(); 
    let dayClass = "";
    if (dayOfWeek === 0) dayClass = "sunday";
    if (dayOfWeek === 6) dayClass = "saturday";
    
    const row = document.createElement('div');
    row.className = `row-item ${dayClass}`;
    
    const weekdayStr = ['일', '월', '화', '수', '목', '금', '토'][dayOfWeek];
    const savedValue = currentMonthData[d] || "";
    
    row.innerHTML = `
      <div class="row-date-badge">${d}일 (${weekdayStr})</div>
      <input type="text" class="name-input" data-day="${d}" id="input-day-${d}" placeholder="이름 또는 단체명 입력" value="${h(savedValue)}" ${isLockedMode ? 'disabled' : ''}>
    `;
    
    const inputEl = row.querySelector('.name-input');
    
    // ⭕ 실시간 타이핑 미러링 기능
    inputEl.addEventListener('input', (e) => {
      const dayKey = e.target.dataset.day;
      currentMonthData[dayKey] = e.target.value;
      
      const calTextEl = document.getElementById(`cal-text-${dayKey}`);
      if(calTextEl) {
        if(e.target.value.trim() !== "") {
          calTextEl.textContent = e.target.value;
          calTextEl.style.display = "block";
        } else {
          calTextEl.textContent = "";
          calTextEl.style.display = "none";
        }
      }
      saveData();
    });

    // ⭕ [핵심 추가] 키보드 화살표 (위/아래) 입력칸 이동 로직 바인딩
    inputEl.addEventListener('keydown', (e) => {
      const currentDay = parseInt(e.target.dataset.day);
      if (e.key === "ArrowDown") {
        e.preventDefault(); // 화면 스크롤 방지
        const nextInput = document.getElementById(`input-day-${currentDay + 1}`);
        if (nextInput) nextInput.focus();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        const prevInput = document.getElementById(`input-day-${currentDay - 1}`);
        if (prevInput) prevInput.focus();
      }
    });
    
    listContainer.appendChild(row);
  }
  
  const calBody = document.getElementById('calendar-body-grid');
  calBody.innerHTML = '';
  
  const firstDayIndex = new Date(year, month - 1, 1).getDay();
  const todayObj = new Date();
  
  for (let i = 0; i < firstDayIndex; i++) {
    const blank = document.createElement('div');
    blank.className = 'calendar-cell other-month';
    blank.innerHTML = `<span class="day-num"></span>`;
    calBody.appendChild(blank);
  }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'calendar-cell';
    
    if (todayObj.getFullYear() === year && (todayObj.getMonth() + 1) === month && todayObj.getDate() === d) {
      cell.classList.add('today');
    }
    
    const nameVal = currentMonthData[d] || "";
    cell.innerHTML = `
      <span class="day-num">${d}</span>
      <div class="list-names" id="cal-text-${d}" style="${nameVal.trim()===''?'display:none':''}">${h(nameVal)}</div>
    `;
    
    calBody.appendChild(cell);
  }
}

function cleanDateStr(str) {
  if (!str) return "";
  let match = String(str).trim().match(/(\d{4})[-/.](\d{2})[-/.](\d{2})/);
  if (match) return match[1] + '-' + match[2] + '-' + match[3];
  return String(str).trim();
}

function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

loadData();
</script>
</body>
</html>
