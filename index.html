<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거여동성당 묵주기도 고리기도 봉헌 시간표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text-primary: #1a1814;
    --text-secondary: #6b6560;
    --text-muted: #9e9990;
    --accent: #7a5c3a;
    --accent-light: #f0e8de;
    --accent-mid: #c4a882;
    --today-bg: #f0ebe3;
    --today-border: #8b6c47;
    --success-bg: #edf4ee;
    --success-border: #7aad7e;
    --success-text: #2d6b32;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1rem 1.5rem;
    text-align: center;
  }
  .cross-symbol {
    display: block;
    font-size: 24px;
    color: var(--accent-mid);
    margin-bottom: 5px;
  }
  .site-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 600;
  }
  .site-subtitle {
    font-size: 13px;
    color: var(--text-muted);
  }

  .container { max-width: 640px; margin: 0 auto; padding: 1rem 0.5rem 3rem; }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding: 0 0.5rem;
  }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 600;
    min-width: 90px;
    text-align: center;
  }
  .btn-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* View Tabs */
  .view-tabs { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .tab {
    background: var(--surface);
    border: none;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-secondary);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab:first-child { border-right: 1px solid var(--border); }
  .tab.active { background: var(--accent); color: #fff; }

  /* Calendar Grid */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 4px;
  }
  .cal-header {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 5px 0;
  }
  .cal-header:first-child { color: #c0594e; }
  .cal-header:last-child { color: #5a82c0; }
  
  .cal-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 90px;
    padding: 6px 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: background 0.1s;
  }
  .cal-day:hover { background: #fdfcf9; }
  .cal-day.past { background: transparent; border-color: transparent; opacity: 0.4; cursor: default; }
  .cal-day.today { background: var(--today-bg); border: 1.5px solid var(--today-border); }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  
  .day-number { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .cal-day.today .day-number { color: var(--accent); font-weight: bold; }
  
  .chips-container {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 4px;
    flex-grow: 1;
    justify-content: flex-start;
  }
  .entry-chip-simple {
    background: var(--success-bg);
    color: var(--success-text);
    font-size: 10px;
    font-weight: 500;
    border-radius: 3px;
    padding: 1px 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }

  /* List View Styling */
  .list-wrapper { display: none; padding: 0 0.5rem; }
  .date-section { margin-bottom: 1.25rem; }
  .date-header {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .date-header.is-today { color: var(--accent); border-bottom-color: var(--accent-mid); }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .list-item.is-today { border-color: var(--today-border); background: var(--today-bg); }
  .item-main { display: flex; align-items: center; gap: 10px; }
  .item-dot { width: 6px; height: 6px; background: var(--success-border); border-radius: 50%; }
  .item-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .today-badge {
    font-size: 10px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid var(--accent-mid);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 6px;
  }
  .item-actions-group { display: flex; gap: 4px; }
  .btn-action-text {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
  }
  .btn-action-text.mod { color: var(--accent); background: var(--accent-light); }
  .btn-action-text.del { color: #c0504e; background: #fde8e8; }

  /* Modals (Popups) */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 1rem;
  }
  .modal-content {
    background: var(--surface);
    padding: 1.5rem;
    border-radius: 12px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .modal h3 { font-family: 'Noto Serif KR', serif; font-size: 16px; margin-bottom: 12px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .modal input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 15px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent-mid); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal button { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; font-family: inherit; }
  .btn-modal-save { background: var(--accent); color: white; }
  .btn-modal-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }

  /* Expanded View List in Modal */
  .expanded-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 15px;
    max-height: 200px;
    overflow-y: auto;
  }
  .expanded-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .expanded-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .btn-add-new-block {
    width: 100%;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px dashed var(--accent-mid);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 10px;
    text-align: center;
  }

  .site-footer { text-align: center; padding: 2rem 1rem; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 2rem; }
</style>
</head>
<body>

<header class="site-header">
  <span class="cross-symbol">✝</span>
  <h1 class="site-title">거여동성당 묵주기도 고리기도 봉헌 시간표</h1>
  <p class="site-subtitle">날짜를 터치하여 봉헌 명단을 확인하거나 등록하세요</p>
</header>

<main class="container">
  <div class="toolbar">
    <div class="month-nav">
      <button class="btn-nav" onclick="prevMonth()">&#8249;</button>
      <span class="month-label" id="month-label"></span>
      <button class="btn-nav" onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="view-tabs">
      <button class="tab active" id="tab-calendar" onclick="setView('calendar')">달력</button>
      <button class="tab" id="tab-list" onclick="setView('list')">목록</button>
    </div>
  </div>

  <div id="view-calendar"></div>
  <div id="view-list" class="list-wrapper"></div>
</main>

<div class="modal" id="detail-modal">
  <div class="modal-content">
    <h3 id="detail-modal-label">0월 0일 봉헌 현황</h3>
    <div class="expanded-list" id="detail-modal-list">
      </div>
    <button class="btn-add-new-block" onclick="switchToInputMode()">+ 새 기도 봉헌 등록하기</button>
    <div class="modal-actions">
      <button class="btn-modal-cancel" style="width:100%" onclick="closeDetailModal()">닫기</button>
    </div>
  </div>
</div>

<div class="modal" id="input-modal">
  <div class="modal-content">
    <h3 id="modal-date-label">기도 등록 및 수정</h3>
    <input type="text" id="modal-name-input" placeholder="이름 또는 단체명 입력">
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeInputModal()">취소</button>
      <button class="btn-modal-save" onclick="saveModalData()">저장하기</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  지나간 날짜의 기도 봉헌은 자동으로 가려집니다
</footer>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfEtUc9PUs3q117nQ0t1hLEIE3ylcA5Tb5z83UZQp-OgpB1oZWPE-WpwaG0vCNXvlsebArWzQ9nbjz/pub?gid=0&single=true&output=csv';
const SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyld0-yQcPJfAnbDrF538rQ6fpx_zz6X-QrmQatkBj2Q6GYifT28swxqe9tzcNcWcfc/exec';

const usePassword = true; 
const PASSWORD_VALUE = "1004";

const DAYS = ['일','월','화','수','목','금','토'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

let view = 'calendar';
let curYear, curMonth;
let entries = []; 
let selectedDateStr = "";
let editingOldName = ""; // 수정 시 매칭할 기존 이름 저장용 변수

function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayDate() {
  const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function parseCSV(text) {
  const lines = text.split('\n').map(line => line.trim()).filter(Boolean);
  if (lines.length <= 1) return [];
  const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
  return lines.slice(1).map(line => {
    const columns = line.split(',').map(c => c.replace(/["']/g, '').trim());
    const row = {};
    headers.forEach((header, i) => { row[header] = columns[i] || ''; });
    return { date: row.date || '', name: row.name || '' };
  });
}

async function fetchEntries() {
  entries = JSON.parse(localStorage.getItem('rosary_local_backup') || '[]');
  render();

  try {
    const secureUrl = SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
    const response = await fetch(secureUrl);
    if (!response.ok) throw new Error('Network response error');
    const text = await response.text();
    const sheetData = parseCSV(text);
    
    if (sheetData && sheetData.length > 0) {
      entries = sheetData;
      localStorage.setItem('rosary_local_backup', JSON.stringify(entries));
      render();
    }
  } catch (error) {
    console.warn("구글 시트 연동 대기 중...", error);
  }
}

async function sendToGoogle(data) {
  if(SCRIPT_WEB_APP_URL && !SCRIPT_WEB_APP_URL.includes('YOUR_APPS_SCRIPT')) {
    try {
      await fetch(SCRIPT_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    } catch(e) { console.error(e); }
  }
}

function setView(v) {
  view = v;
  document.getElementById('tab-calendar').classList.toggle('active', v === 'calendar');
  document.getElementById('tab-list').classList.toggle('active', v === 'list');
  document.getElementById('view-calendar').style.display = v === 'calendar' ? 'block' : 'none';
  document.getElementById('view-list').style.display = v === 'list' ? 'block' : 'none';
  render();
}

function renderCalendar() {
  const el = document.getElementById('view-calendar');
  if (!el) return;
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const td = todayDate();
  const todayStr = toDateStr(td);

  const byDate = {};
  entries.forEach(e => { if(e.date) { if(!byDate[e.date]) byDate[e.date] = []; byDate[e.date].push(e.name); } });

  let h = '<div class="calendar-grid">';
  DAYS.forEach((d,i) => h += `<div class="cal-header" style="${i===0?'color:#c0594e':i===6?'color:#5a82c0':''}">${d}</div>`);
  for (let i = 0; i < firstDay; i++) h += '<div class="cal-day empty"></div>';
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(curYear, curMonth, d);
    const ds = toDateStr(dt);
    const isPast = dt < td;
    const isToday = ds === todayStr;
    const names = byDate[ds] || [];
    
    let cls = 'cal-day';
    if (isPast) cls += ' past';
    else if (isToday) cls += ' today';
    const numColor = dt.getDay()===0 ? 'color:#c0594e' : dt.getDay()===6 ? 'color:#5a82c0' : '';
    
    h += `<div class="${cls}" onclick="openDetailModal('${ds}', ${isPast})">
            <div class="day-number" style="${numColor}">${d}</div>
            <div class="chips-container">`;
    if (!isPast) {
      names.forEach(name => {
        h += `<div class="entry-chip-simple">${name}</div>`;
      });
    }
    h += `</div></div>`;
  }
  h += '</div>';
  el.innerHTML = h;
}

function renderList() {
  const el = document.getElementById('view-list');
  if (!el) return;
  const td = todayDate();
  const todayStr = toDateStr(td);
  
  const filtered = entries.filter(e => {
    if(!e.date) return false;
    const dt = new Date(e.date.split('-')[0], e.date.split('-')[1]-1, e.date.split('-')[2]);
    return e.date.startsWith(`${curYear}-${String(curMonth+1).padStart(2,'0')}`) && dt >= td;
  });
  
  filtered.sort((a,b) => a.date.localeCompare(b.date));

  if (filtered.length === 0) {
    el.innerHTML = '<div class="date-section" style="text-align:center; padding:3rem 0; color:var(--text-muted);">이번 달에 예정된 기도 봉헌이 없습니다.</div>';
    return;
  }

  let h = '';
  let lastDate = '';
  filtered.forEach(e => {
    if (e.date !== lastDate) {
      const [y, m, d] = e.date.split('-').map(Number);
      const dt = new Date(y, m-1, d);
      const isT = e.date === todayStr;
      h += `${lastDate ? '</div>' : ''}<div class="date-section">
              <div class="date-header ${isT?'is-today':''}">${m}월 ${d}일 ${DAYS[dt.getDay()]}요일 ${isT?'· 오늘':''}</div>`;
      lastDate = e.date;
    }
    h += `<div class="list-item ${e.date===todayStr?'is-today':''}">
            <div class="item-main">
              <div class="item-dot"></div>
              <span class="item-name">${e.name}</span>
              ${e.date===todayStr?'<span class="today-badge">오늘</span>':''}
            </div>
            <div class="item-actions-group">
              <button class="btn-action-text mod" onclick="openInputModal('${e.date}', '${e.name}')">수정</button>
              <button class="btn-action-text del" onclick="deleteData('${e.date}', '${e.name}')">삭제</button>
            </div>
          </div>`;
  });
  h += '</div>';
  el.innerHTML = h;
}

// 1 & 2. 날짜 클릭 시 열리는 대형 확대 모달 팝업창
function openDetailModal(dateStr, isPast) {
  if (isPast) return;
  selectedDateStr = dateStr;
  const [y, m, d] = dateStr.split('-');
  document.getElementById('detail-modal-label').textContent = `${parseInt(m)}월 ${parseInt(d)}일 봉헌 현황`;
  
  const listEl = document.getElementById('detail-modal-list');
  listEl.innerHTML = "";
  
  const dayEntries = entries.filter(e => e.date === dateStr);
  
  if (dayEntries.length === 0) {
    listEl.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:1rem 0; font-size:14px;">등록된 봉헌 명단이 없습니다.</div>';
  } else {
    dayEntries.forEach(e => {
      listEl.innerHTML += `
        <div class="expanded-item">
          <span class="expanded-name">${e.name}</span>
          <div class="item-actions-group">
            <button class="btn-action-text mod" onclick="openInputModal('${dateStr}', '${e.name}')">수정</button>
            <button class="btn-action-text del" onclick="deleteData('${dateStr}', '${e.name}')">삭제</button>
          </div>
        </div>`;
    });
  }
  
  document.getElementById('detail-modal').style.display = 'flex';
}

function closeDetailModal() {
  document.getElementById('detail-modal').style.display = 'none';
}

function switchToInputMode() {
  closeDetailModal();
  openInputModal(selectedDateStr, "");
}

// 등록 및 수정을 전담하는 범용 입력 모달창
function openInputModal(dateStr, oldName = "") {
  closeDetailModal(); // 혹시 열려있을 상세창 닫기
  selectedDateStr = dateStr;
  editingOldName = oldName; // 이름이 넘어오면 수정 모드, 없으면 신규등록 모드
  
  const [y, m, d] = dateStr.split('-');
  const titleText = oldName ? `${parseInt(m)}월 ${parseInt(d)}일 명단 수정` : `${parseInt(m)}월 ${parseInt(d)}일 새 봉헌 등록`;
  document.getElementById('modal-date-label').textContent = titleText;
  document.getElementById('modal-name-input').value = oldName;
  
  document.getElementById('input-modal').style.display = 'flex';
  document.getElementById('modal-name-input').focus();
}

function closeInputModal() {
  document.getElementById('input-modal').style.display = 'none';
  editingOldName = "";
}

async function saveModalData() {
  const newName = document.getElementById('modal-name-input').value.trim();
  if (!newName) { alert('이름을 입력해 주세요.'); return; }
  
  if (usePassword) {
    const pw = prompt("수정 비밀번호를 입력하세요:");
    if (pw !== PASSWORD_VALUE) { alert("비밀번호가 틀렸습니다."); return; }
  }

  // 수정 모드인 경우기존 구글 시트 데이터 삭제 요청 먼저 전송
  if (editingOldName) {
    await sendToGoogle({ action: "delete", date: selectedDateStr, name: editingOldName });
    entries = entries.filter(e => !(e.date === selectedDateStr && e.name === editingOldName));
  } else {
    // 신규 등록일 때 기존 날짜 명단 덮어쓰기 방지 처리 (여러 명 등록 가능하도록 설정 변경)
    // 원본처럼 하루에 한 명만 남기려면 이 줄을 활성화하세요: entries = entries.filter(e => e.date !== selectedDateStr);
  }
  
  // 구글 시트로 새 데이터 전송
  await sendToGoogle({ action: "insert", date: selectedDateStr, name: newName });
  entries.push({ date: selectedDateStr, name: newName });
  
  localStorage.setItem('rosary_local_backup', JSON.stringify(entries));
  
  alert('저장되었습니다. 구글 시트 반영까지 3~5분이 걸릴 수 있습니다.');
  closeInputModal();
  render();
  setTimeout(fetchEntries, 2000);
}

async function deleteData(dateStr, name) {
  if (!confirm(`${name} 님의 기도를 삭제할까요?`)) return;
  if (usePassword) {
    const pw = prompt("수정 비밀번호를 입력하세요:");
    if (pw !== PASSWORD_VALUE) { alert("비밀번호가 틀렸습니다."); return; }
  }
  
  await sendToGoogle({ action: "delete", date: dateStr, name: name });
  entries = entries.filter(e => !(e.date === dateStr && e.name === name));
  localStorage.setItem('rosary_local_backup', JSON.stringify(entries));
  
  alert('삭제되었습니다.');
  closeDetailModal();
  render();
  setTimeout(fetchEntries, 2000);
}

function render() {
  const label = document.getElementById('month-label');
  if(label) label.textContent = `${curYear}년 ${MONTHS[curMonth]}`;
  if (view === 'calendar') renderCalendar(); else renderList();
}

function prevMonth() { curMonth--; if (curMonth < 0) { curMonth = 11; curYear--; } render(); }
function nextMonth() { curMonth++; if (curMonth > 11) { curMonth = 0; curYear++; } render(); }

const now = new Date();
curYear = now.getFullYear();
curMonth = now.getMonth();

fetchEntries();
</script>
</body>
</html>
